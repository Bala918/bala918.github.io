<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>My Offline App</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#2563eb">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:320px;
            padding:25px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:20px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            font-size:16px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
        }

        h2{
            margin-bottom:10px;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            color:#2563eb;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>👋 Hello App</h2>

    <input
        id="name"
        placeholder="Enter your name">

    <button onclick="sayHello()">
        Say Hello
    </button>

    <div id="result"></div>
</div>

<script>

function sayHello(){

    let name=document.getElementById("name").value.trim();

    if(name===""){
        alert("Enter your name");
        return;
    }

    localStorage.setItem("username",name);

    document.getElementById("result").innerHTML=
        "Hello "+name+"!";
}

window.onload=function(){

    let saved=localStorage.getItem("username");

    if(saved){
        document.getElementById("name").value=saved;
        document.getElementById("result").innerHTML="Welcome back "+saved+"!";
    }

}

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
